name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install Capacitor 5
        run: npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5

      - name: Add Android platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Upgrade Gradle wrapper to 8.7
        run: |
          sed -i 's|gradle-7.*-all|gradle-8.7-all|g' android/gradle/wrapper/gradle-wrapper.properties
          sed -i 's|gradle-8.*-all|gradle-8.7-all|g' android/gradle/wrapper/gradle-wrapper.properties

      - name: Fix Gradle JVM args
        run: |
          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "org.gradle.caching=false" >> android/gradle.properties

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore release.jks \
            -alias budget-release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass HadrShot2024 \
            -keypass HadrShot2024 \
            -dname "CN=Budget App, O=HadrShot, L=Israel, C=IL"

      - name: Build release APK (unsigned)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --no-build-cache

      - name: Sign APK with apksigner
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks release.jks \
            --ks-pass pass:HadrShot2024 \
            --key-pass pass:HadrShot2024 \
            --ks-key-alias budget-release \
            --out budget-app-signed.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: budget-app-signed
          path: budget-app-signed.apk
          retention-days: 30
